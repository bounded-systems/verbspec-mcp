name: publish

# Publish @bounded-systems/verbspec-mcp to JSR using KEYLESS OIDC.
#
# Single source of truth: JSR. Node/npm consumers resolve the package through
# JSR's npm compatibility bridge (npm.jsr.io, the @jsr/* scope) — no native npm
# publish is required. Its JSR-only dep (@bounded-systems/verbspec) reaches Node
# via that same bridge (see .npmrc). We do NOT mirror to native npm: npm trusted
# publishing cannot create a brand-new package name via OIDC (it 404s on the
# initial PUT), and seeding it with a token would break the keyless-only model.
#
# No tokens are stored in this repo:
#   - JSR: `deno publish` mints a short-lived GitHub Actions OIDC token JSR trusts
#     (link the repo once at jsr.io/@bounded-systems/verbspec-mcp -> Settings).
#
# Triggered only by a `v*` tag (or manual dispatch). Never publishes on push.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # REQUIRED: lets the jsr job mint the OIDC token JSR trusts

jobs:
  jsr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.x
      - name: Publish to JSR (keyless OIDC)
        run: deno publish --allow-slow-types
